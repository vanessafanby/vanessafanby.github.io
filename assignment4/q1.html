<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Question 1</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <!-- This is an AI generated video created on the website 'ElonTalks'. I saw the news saying that Elon was promoting a financial venture, which is used to mislead people into investing in a financial scam, which inspired me with this idea. Therefore, I decided to use Elon's appearence to alert people to recognise real and AI-generated videos -->
  <body
    data-head="Is this video real or AI-generated?"
    data-src="videos/q1.mp4"
    data-correct="ai"
    data-next="q2.html"
    data-prev=""
    data-progress="0"
    data-fb-ai-ok="WELL SPOTTED! The voice doesn’t match the mouth movements perfectly — a common deepfake problem."
    data-fb-ai-no="INCORRECT. This is a deepfake — the lip-syncing isn’t consistent with the audio."
    data-fb-real-ok="If you thought it was real: compare blinking and lip-sync more closely next time."
    data-fb-real-no="INCORRECT. This is a deepfake — look for unnatural facial movements and timing mismatches."
  >
    <!-- Here are the different comments that pops up for each question and each button they press on.  -->
    <header class="site-header">
      <h1 class="title">Is this video real or AI-generated?</h1>
    </header>

    <main class="container">
      <section class="card">
        <div class="video-wrap">
          <video id="videoEl" class="video" controls preload="metadata">
            <source id="videoSrc" src="videos/q1.mp4" type="video/mp4" />
          </video>
        </div>

        <div class="choices">
          <button id="btnAI" class="btn choice">AI-GENERATED</button>
          <button id="btnReal" class="btn choice">REAL</button>
        </div>

        <div id="feedback" class="feedback"></div>
      </section>
      <!-- Here, I have added in previous and next buttons on each page so the user can move freely in each page.  -->
      <button
        id="prevBtn"
        class="fab fab-prev"
        title="Previous"
        aria-label="Previous"
      >
        ←
      </button>
      <button
        id="nextBtn"
        class="fab fab-next"
        title="Next"
        aria-label="Next"
        disabled
      >
        ➜
      </button>

      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
        <!-- I have added in a progress bar in every page, so the user will know where their progress is and how many questions they have left to answer.  -->
      </div>
    </main>

    <audio id="soundCorrect" src="sound/correct.mp3" preload="auto"></audio>
    <audio id="soundWrong" src="sound/wrong.mp3" preload="auto"></audio>

    <script src="page.js"></script>
  </body>
</html>
