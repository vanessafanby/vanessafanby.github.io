<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Question 4</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <!-- This is an AI generated video. At first, I downloaded a free video online of a person waving their hand, then i converted it to a script-audio-video on Hailuo AI. Regarding to the feedback I received in-class, I cropped and removed the watermarks, to make the video not that obvious that it's 'AI-generated'-->
  <body
    data-head="Is this video real or AI-generated?"
    data-src="videos/q4.mp4"
    data-correct="ai"
    data-next="q5.html"
    data-prev="q3.html"
    data-progress="75"
    data-fb-ai-ok="CORRECT! The eyes and blinking look unnatural — AI often gets micro-expressions wrong."
    data-fb-ai-no="INCORRECT! This is AI-generated — the eyes don’t focus naturally and blink at irregular intervals."
    data-fb-real-ok="If you thought it was real: compare the gaze and blink rhythm with other real clips."
    data-fb-real-no="WRONG. This is a deepfake — eye focus and blink timing are the giveaway."
  >
    <!-- Here are the different comments that pops up for each question and each button they press on.  -->
    <header class="site-header">
      <h1 class="title">Is this video real or AI-generated?</h1>
    </header>

    <main class="container">
      <section class="card">
        <div class="video-wrap">
          <video id="videoEl" class="video" controls preload="metadata">
            <source id="videoSrc" src="videos/q4.mp4" type="video/mp4" />
          </video>
        </div>

        <div class="choices">
          <button id="btnAI" class="btn choice">AI-GENERATED</button>
          <button id="btnReal" class="btn choice">REAL</button>
        </div>

        <div id="feedback" class="feedback"></div>
      </section>
      <!-- Here, I have added in previous and next buttons on each page so the user can move freely in each page.  -->
      <button
        id="prevBtn"
        class="fab fab-prev"
        title="Previous"
        aria-label="Previous"
      >
        ←
      </button>
      <button
        id="nextBtn"
        class="fab fab-next"
        title="Next"
        aria-label="Next"
        disabled
      >
        ➜
      </button>

      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
        <!-- I have added in a progress bar in every page, so the user will know where their progress is and how many questions they have left to answer.  -->
      </div>
    </main>

    <script src="page.js"></script>
  </body>
</html>
