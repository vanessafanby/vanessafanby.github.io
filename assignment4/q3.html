<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Question 3</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <!-- This is AI-generated data, using Heygen Ai. The avatar is a role to act as a 'boyfriend', in a hurry to ask his girlfriend for money. I decided to add in a couple relationship to alert users to be careful with every person that asks for a transfer. Even with their closest ones -->
  <body
    data-head="Is this video real or AI-generated?"
    data-src="videos/q3.mp4"
    data-correct="ai"
    data-next="q4.html"
    data-prev="q2.html"
    data-progress="50"
    data-fb-ai-ok="WELL DONE! The voice has a steady timbre while the mouth movement is uneven."
    data-fb-ai-no="WRONG! This is AI-generated — the audio and mouth movement don’t align perfectly."
    data-fb-real-ok="If you thought it was real: listen for mechanical cadence and watch the mouth closely."
    data-fb-real-no="INCORRECT. This is a deepfake — look for uneven mouth shapes against steady audio."
  >
    <!-- Here are the different comments that pops up for each question and each button they press on.  -->
    <header class="site-header">
      <h1 class="title">Is this video real or AI-generated?</h1>
    </header>

    <main class="container">
      <section class="card">
        <div class="video-wrap">
          <video id="videoEl" class="video" controls preload="metadata">
            <source id="videoSrc" src="videos/q3.mp4" type="video/mp4" />
          </video>
        </div>

        <div class="choices">
          <button id="btnAI" class="btn choice">AI-GENERATED</button>
          <button id="btnReal" class="btn choice">REAL</button>
        </div>

        <div id="feedback" class="feedback"></div>
      </section>
      <!-- Here, I have added in previous and next buttons on each page so the user can move freely in each page.  -->
      <button
        id="prevBtn"
        class="fab fab-prev"
        title="Previous"
        aria-label="Previous"
      >
        ←
      </button>
      <button
        id="nextBtn"
        class="fab fab-next"
        title="Next"
        aria-label="Next"
        disabled
      >
        ➜
      </button>

      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
        <!-- I have added in a progress bar in every page, so the user will know where their progress is and how many questions they have left to answer.  -->
      </div>
    </main>

    <script src="page.js"></script>
  </body>
</html>
